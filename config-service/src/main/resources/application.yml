server:
  port: 8888

spring:
  application:
    name: config-service
  profiles:
    # 예제 단순화를 위해 native 모드(로컬 classpath) 사용.
    # 실무에서는 Git 저장소를 백엔드로 사용한다:
    #   spring.cloud.config.server.git.uri: https://github.com/my-org/config-repo
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config-repo
